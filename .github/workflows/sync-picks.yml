name: Sync Picks from Google Sheet (disabled — moving to Firebase)

# Disabled while we transition to a Firebase-backed entry form for the 2026 U.S. Open pool.
# The sheet path no longer feeds picks.json; Firestore will be the source of truth.
# Re-enable (un-comment the schedule/push triggers + restore SHEET_CSV_URL in
# scripts/sync-picks.mjs) only if reverting to the Google Form workflow.

on:
  workflow_dispatch:          # manual trigger only

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch sheet and write picks.json
        run: node scripts/sync-picks.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/picks.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/picks.json
          git commit -m "Update picks.json from Google Sheet"
          git push
